name: apply

on:
  push:
    branches: [main]
    paths:
      - "env/**"
      - "modules/**"
      - ".tool-versions"
      - "scripts/**"
      - ".github/workflows/apply.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.5"
  TG_VERSION: "0.72.6"

jobs:
  apply:
    name: apply (${{ matrix.env_path }})
    runs-on: ubuntu-latest
    # Roll out sandbox -> tst -> prd, one at a time. `production` should be a protected
    # GitHub Environment requiring manual approval before the prd job runs. `env/local`
    # targets the floci-gcp emulator for local iteration and is not deployed by CI.
    strategy:
      max-parallel: 1
      matrix:
        include:
          - { env_path: gcp/sandbox, gh_environment: sandbox, sa_var: GCP_SANDBOX_DEPLOYER_SA }
          - { env_path: gcp/tst, gh_environment: tst, sa_var: GCP_TST_DEPLOYER_SA }
          - { env_path: gcp/prd, gh_environment: production, sa_var: GCP_PRD_DEPLOYER_SA }
    environment: ${{ matrix.gh_environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sfLo /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      # Diff the pushed range so we only apply what actually changed in this merge.
      - name: Resolve diff base
        id: base
        run: |
          base='${{ github.event.before }}'
          if [ -z "$base" ] || ! git rev-parse --verify --quiet "${base}^{commit}" >/dev/null; then
            base="HEAD~1"
          fi
          echo "ref=$base" >> "$GITHUB_OUTPUT"

      - name: Detect changed units
        id: detect
        run: |
          n="$(./scripts/changed-units.sh '${{ matrix.env_path }}' '${{ steps.base.outputs.ref }}' | grep -c . || true)"
          echo "count=$n" >> "$GITHUB_OUTPUT"

      - id: auth
        if: steps.detect.outputs.count != '0'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars[matrix.sa_var] }}

      - name: terragrunt apply (changed units only)
        if: steps.detect.outputs.count != '0'
        run: ./scripts/tg-run.sh apply '${{ matrix.env_path }}' '${{ steps.base.outputs.ref }}'
