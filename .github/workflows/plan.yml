name: plan

on:
  pull_request:
    branches: [main]
    paths:
      - "env/**"
      - "modules/**"
      - ".tool-versions"
      - "scripts/**"
      - ".github/workflows/plan.yml"

# WIF needs id-token; the plan is posted back to the PR.
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.14.5"
  TG_VERSION: "0.72.6"

jobs:
  plan:
    name: plan (${{ matrix.env_path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # CI only plans/applies real clouds. `env/local` targets the floci-gcp emulator for
      # fast local iteration (see README) and is intentionally not part of this matrix.
      matrix:
        include:
          - { env_path: gcp/sandbox, sa_var: GCP_SANDBOX_DEPLOYER_SA }
          - { env_path: gcp/tst, sa_var: GCP_TST_DEPLOYER_SA }
          - { env_path: gcp/prd, sa_var: GCP_PRD_DEPLOYER_SA }
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can diff the PR against its base branch.
          fetch-depth: 0

      - name: Ensure base branch is available for diffing
        run: git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sfLo /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      - name: Detect changed units
        id: detect
        run: |
          units="$(./scripts/changed-units.sh '${{ matrix.env_path }}' 'origin/${{ github.base_ref }}')"
          echo "count=$(printf '%s' "$units" | grep -c . || true)" >> "$GITHUB_OUTPUT"
          { echo "units<<EOF"; echo "$units"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      # Keyless auth via Workload Identity Federation. Only bother when there is something to plan.
      # Configure repo variables: GCP_WORKLOAD_IDENTITY_PROVIDER and <matrix.sa_var>.
      - id: auth
        if: steps.detect.outputs.count != '0'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars[matrix.sa_var] }}

      - name: terragrunt plan (changed units only)
        id: plan
        if: steps.detect.outputs.count != '0'
        run: |
          set -o pipefail
          ./scripts/tg-run.sh plan '${{ matrix.env_path }}' "origin/${{ github.base_ref }}" \
            2>&1 | tee plan.txt

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const envPath = '${{ matrix.env_path }}';
            const count = '${{ steps.detect.outputs.count }}';
            const units = `${{ steps.detect.outputs.units }}`.trim();
            let body;
            if (!count || count === '0') {
              body = `### Terragrunt plan — \`${envPath}\`\n\nNo changed units in this environment. ✅`;
            } else {
              let plan = '';
              try { plan = fs.readFileSync('plan.txt', 'utf8'); } catch (e) { plan = '(no plan output captured)'; }
              const clipped = plan.length > 60000 ? plan.slice(-60000) : plan;
              body = [
                `### Terragrunt plan — \`${envPath}\` (\`${{ steps.plan.outcome }}\`)`,
                '',
                `**Changed units (${count}):**`,
                '```',
                units,
                '```',
                '<details><summary>Show plan</summary>',
                '',
                '```',
                clipped,
                '```',
                '</details>',
              ].join('\n');
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
