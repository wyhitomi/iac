name: plan

on:
  pull_request:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"
      - "root.hcl"
      - ".github/workflows/plan.yml"

# WIF needs id-token; the plan is posted back to the PR.
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.14.5"
  TG_VERSION: "0.72.6"

jobs:
  plan:
    name: plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sfLo /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      # Keyless auth via Workload Identity Federation. Configure these repo variables:
      #   GCP_WORKLOAD_IDENTITY_PROVIDER, and a per-environment service account:
      #   DEV_DEPLOYER_SA / PROD_DEPLOYER_SA
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars[format('{0}_DEPLOYER_SA', matrix.environment == 'prod' && 'PROD' || 'DEV')] }}

      - name: terragrunt plan
        id: plan
        working-directory: live/${{ matrix.environment }}
        run: |
          set -o pipefail
          terragrunt run-all plan --terragrunt-non-interactive --terragrunt-no-color 2>&1 | tee plan.txt

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.environment }}';
            let body;
            try {
              const plan = fs.readFileSync(`live/${env}/plan.txt`, 'utf8');
              const clipped = plan.length > 60000 ? plan.slice(-60000) : plan;
              body = `### Terragrunt plan — \`${env}\` (\`${{ steps.plan.outcome }}\`)\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${clipped}\n\`\`\`\n\n</details>`;
            } catch (e) {
              body = `### Terragrunt plan — \`${env}\`\n\nNo plan output was produced.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
